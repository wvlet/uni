version = 3.11.4
project.layout = StandardConvention
runner.dialect = scala3
maxColumn = 100
style = defaultWithAlign
docstrings.blankFirstLine = yes
rewrite.scala3.convertToNewSyntax = true
rewrite.scala3.removeOptionalBraces = yes
rewrite.scala3.insertEndMarkerMinLines = 30
newlines.topLevelStatementBlankLines = [
  {
    blanks { after = 1 }
  }
]
newlines.source = unfold

fileOverride {
  // The crossProject macro mixes inline/quote splices; optional-brace removal and unfolding
  // both misbehave on macro code, so keep braces and folding here.
  "glob:**/CrossProjectMacro.scala" {
    rewrite.scala3.removeOptionalBraces = no
    newlines.source = fold
  }
}
